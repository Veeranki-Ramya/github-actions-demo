name: simple-ci-cd-pipeline

on:
  push: 
    branches:
      - main
env:
  APP_NAME: myapp
  ENV: dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: print name
        run: echo "This is $ENV environment"

      - name: print pwd
        run: pwd

      - name: create file
        run: echo "hi how are you" > sample.txt

      - name: shows file
        run: cat sample.txt
